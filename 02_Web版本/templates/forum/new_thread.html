<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="create_new_thread">New Thread - SolarOrca</title>
    <style>
        :root {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="ocean"] {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="fall"] {
            --primary: #D35400;
            --secondary: #F39C12;
            --background: #FDF2E3;
            --card-bg: #FFF8F0;
            --text: #5D4037;
            --text-light: #8D6E63;
            --border: #E8D5B5;
        }
        [data-theme="midnight"] {
            --primary: #00B4D8;
            --secondary: #7B2EDA;
            --background: #0A1929;
            --card-bg: #1E2A3A;
            --text: #E0E0E0;
            --text-light: #A0AAB5;
            --border: #2A3A4A;
        }
        [data-theme="blossom"] {
            --primary: #E8A2B0;
            --secondary: #F5C6D0;
            --background: #FFF5F7;
            --card-bg: #FFFFFF;
            --text: #5E4B56;
            --text-light: #9A8B92;
            --border: #F0DDE3;
        }

        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: var(--background);
            color: var(--text);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .menu {
            margin-bottom: 20px;
        }
        .menu a {
            margin-right: 15px;
            color: var(--primary);
            text-decoration: none;
        }
        .menu a:hover { text-decoration: underline; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text);
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text);
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        .btn {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--secondary);
        }
        .cancel-link {
            margin-left: 10px;
            color: var(--text-light);
            text-decoration: none;
        }
        .cancel-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        .form-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 600px) {
            textarea {
                min-height: 150px;
            }
            .form-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .cancel-link {
                margin-left: 0;
                text-align: center;
            }
        }
    </style>
    <script>
    (function() {
        // 从 localStorage 读取已保存的主题
        const theme = localStorage.getItem('selectedTheme') || 'ocean';

        // 如果是自定义主题，直接覆盖 CSS 变量
        if (theme === 'custom') {
            const custom = localStorage.getItem('customTheme');
            if (custom) {
                try {
                    const t = JSON.parse(custom);
                    document.documentElement.style.setProperty('--primary', t.primary);
                    document.documentElement.style.setProperty('--secondary', t.secondary);
                    document.documentElement.style.setProperty('--background', t.background);
                    document.documentElement.style.setProperty('--card-bg', t.cardBg);
                    document.documentElement.style.setProperty('--text', t.text);
                    // 移除 data-theme 属性，避免覆盖自定义变量
                    document.documentElement.removeAttribute('data-theme');
                    return;
                } catch(e) {
                    console.error('Failed to load custom theme', e);
                }
            }
        }

        // 否则，设置 data-theme 属性以匹配保存的主题
        document.documentElement.setAttribute('data-theme', theme);
    })();
</script>
</head>
<body>

<div class="container">
    <!-- 导航菜单 -->
    <div class="menu">
        <a href="/home/" data-i18n="home">Home</a>
        <a href="/profile/" data-i18n="my_profile">My Profile</a>
        <a href="/settings/" data-i18n="settings">Settings</a>
        <a href="/02_Web版本/classes" data-i18n="classes">Classes</a>
        <a href="/02_Web版本/forum" data-i18n="forum">Forum</a>
        <a href="/02_Web版本/jobs" data-i18n="job_search">Job Search</a>
        {% if user_role == 'admin' %}
        <a href="/admin-panel/users/" data-i18n="admin">Admin</a>
        {% endif %}
        <a href="/logout/" data-i18n="logout">Logout</a>
        <span style="float:right;" data-i18n="welcome_prefix">Welcome, {{ user_name }}</span>
    </div>

    <h1 data-i18n="create_new_thread">Create New Thread</h1>

    <!-- 显示后端返回的错误消息 -->
    {% if messages %}
        {% for msg in messages %}
            <div class="message">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <!-- 发帖表单 -->
    <form action="/02_Web版本/forum/new/" method="post">
        {% csrf_token %}

        <!-- 标题 -->
        <div class="form-group">
            <label for="title" data-i18n="title">Title:</label>
            <input type="text" id="title" name="title" maxlength="200" required>
        </div>

        <!-- 内容 -->
        <div class="form-group">
            <label for="content" data-i18n="content">Content:</label>
            <textarea id="content" name="content" required></textarea>
        </div>

        <!-- 可见性 -->
        <div class="form-group">
            <label for="is_alumni_only" data-i18n="visibility">Visibility:</label>
            <select id="is_alumni_only" name="is_alumni_only">
                <option value="false" data-i18n="public">Public (Everyone can see)</option>
                <option value="true" data-i18n="alumni_only">Alumni Only (Only alumni and admin can see)</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn" data-i18n="post_thread">Post Thread</button>
            <a href="/02_Web版本/forum" class="cancel-link" data-i18n="cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
