<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - SolarOrca</title>
    <style>
        :root {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="ocean"] {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="fall"] {
            --primary: #D35400;
            --secondary: #F39C12;
            --background: #FDF2E3;
            --card-bg: #FFF8F0;
            --text: #5D4037;
            --text-light: #8D6E63;
            --border: #E8D5B5;
        }
        [data-theme="midnight"] {
            --primary: #00B4D8;
            --secondary: #7B2EDA;
            --background: #0A1929;
            --card-bg: #1E2A3A;
            --text: #E0E0E0;
            --text-light: #A0AAB5;
            --border: #2A3A4A;
        }
        [data-theme="blossom"] {
            --primary: #E8A2B0;
            --secondary: #F5C6D0;
            --background: #FFF5F7;
            --card-bg: #FFFFFF;
            --text: #5E4B56;
            --text-light: #9A8B92;
            --border: #F0DDE3;
        }

        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: var(--background);
            color: var(--text);
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        .menu {
            margin-bottom: 20px;
        }
        .menu a {
            margin-right: 15px;
            color: var(--primary);
            text-decoration: none;
        }
        .menu a:hover {
            text-decoration: underline;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .form-label {
            display: inline-block;
            width: 110px;
            font-weight: bold;
            color: var(--text);
        }
        input, select {
            width: 320px;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        input[disabled] {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--secondary);
        }
        .cancel-link {
            margin-left: 15px;
            color: var(--text-light);
            text-decoration: none;
        }
        .cancel-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .form-actions {
            margin-top: 20px;
        }
        .note {
            font-size: 12px;
            color: var(--text-light);
            margin-left: 10px;
        }

        @media (max-width: 650px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-label {
                width: auto;
                margin-bottom: 5px;
            }
            input, select {
                width: 100%;
                max-width: 320px;
            }
            .note {
                margin-left: 0;
                margin-top: 5px;
                display: block;
            }
        }
    </style>
    <script>
    (function() {
        // 从 localStorage 读取已保存的主题
        const theme = localStorage.getItem('selectedTheme') || 'ocean';

        // 如果是自定义主题，直接覆盖 CSS 变量
        if (theme === 'custom') {
            const custom = localStorage.getItem('customTheme');
            if (custom) {
                try {
                    const t = JSON.parse(custom);
                    document.documentElement.style.setProperty('--primary', t.primary);
                    document.documentElement.style.setProperty('--secondary', t.secondary);
                    document.documentElement.style.setProperty('--background', t.background);
                    document.documentElement.style.setProperty('--card-bg', t.cardBg);
                    document.documentElement.style.setProperty('--text', t.text);
                    // 移除 data-theme 属性，避免覆盖自定义变量
                    document.documentElement.removeAttribute('data-theme');
                    return;
                } catch(e) {
                    console.error('Failed to load custom theme', e);
                }
            }
        }

        // 否则，设置 data-theme 属性以匹配保存的主题
        document.documentElement.setAttribute('data-theme', theme);
    })();
</script>
</head>
<body>

<div class="container">
    <!-- 导航菜单 -->
    <div class="menu">
        <a href="/home/">Home</a>
        <a href="/profile/">My Profile</a>
        <a href="/settings/">Settings</a>
        <a href="/02_Web版本/classes">Classes</a>
        <a href="/02_Web版本/forum">Forum</a>
        <a href="/02_Web版本/jobs">Job Search</a>
        <a href="/admin-panel/users/">User Management</a>
        <a href="/admin-panel/reports/">Reports</a>
        <a href="/logout/">Logout</a>
        <span style="float:right;">Welcome, {{ user_name }}</span>
    </div>

    <h1>Edit User: {{ edit_user.full_name }}</h1>

    <!-- 显示后端返回的消息 -->
    {% if messages %}
        {% for msg in messages %}
            <div class="message {% if msg.tags == 'success' %}success{% else %}error{% endif %}">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- 编辑用户表单 -->
    <form method="post">
        {% csrf_token %}

        <!-- 姓名 -->
        <div class="form-group">
            <label for="full_name" class="form-label">Full Name:</label>
            <input type="text" id="full_name" name="full_name" value="{{ edit_user.full_name }}" required>
        </div>

        <!-- 邮箱 -->
        <div class="form-group">
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" name="email" value="{{ edit_user.email }}" required>
        </div>

        <!-- 学号（不可修改） -->
        <div class="form-group">
            <label for="student_id" class="form-label">Student ID:</label>
            <input type="text" id="student_id" value="{{ edit_user.student_id }}" disabled>
            <span class="note">(cannot be changed)</span>
        </div>

        <!-- 所在地 -->
        <div class="form-group">
            <label for="location" class="form-label">Location:</label>
            <input type="text" id="location" name="location" value="{{ edit_user.location|default:'' }}">
        </div>

        <!-- 角色 -->
        <div class="form-group">
            <label for="role" class="form-label">Role:</label>
            <select id="role" name="role">
                <option value="student" {% if edit_user.role == 'student' %}selected{% endif %}>Student</option>
                <option value="alumni" {% if edit_user.role == 'alumni' %}selected{% endif %}>Alumni</option>
                <option value="teacher" {% if edit_user.role == 'teacher' %}selected{% endif %}>Teacher</option>
                <option value="admin" {% if edit_user.role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <!-- 班级 -->
        <div class="form-group">
            <label for="class_id" class="form-label">Class:</label>
            <select id="class_id" name="class_id">
                <option value="">-- No Class Assigned --</option>
                {% for class in classes %}
                <option value="{{ class.class_id }}" {% if current_class_id == class.class_id %}selected{% endif %}>
                    {{ class.faculty }} | {{ class.major }} | Class {{ class.class_number }} | {{ class.graduation_year }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Changes</button>
            <a href="/admin-panel/users/" class="cancel-link">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
