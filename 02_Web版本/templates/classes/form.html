<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if is_edit %}
        <span data-i18n="edit_class">Edit Class</span>
        {% else %}
        <span data-i18n="add_class">Add Class</span>
        {% endif %} - SolarOrca
    </title>
    <style>
        :root {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="ocean"] {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="fall"] {
            --primary: #D35400;
            --secondary: #F39C12;
            --background: #FDF2E3;
            --card-bg: #FFF8F0;
            --text: #5D4037;
            --text-light: #8D6E63;
            --border: #E8D5B5;
        }
        [data-theme="midnight"] {
            --primary: #00B4D8;
            --secondary: #7B2EDA;
            --background: #0A1929;
            --card-bg: #1E2A3A;
            --text: #E0E0E0;
            --text-light: #A0AAB5;
            --border: #2A3A4A;
        }
        [data-theme="blossom"] {
            --primary: #E8A2B0;
            --secondary: #F5C6D0;
            --background: #FFF5F7;
            --card-bg: #FFFFFF;
            --text: #5E4B56;
            --text-light: #9A8B92;
            --border: #F0DDE3;
        }

        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: var(--background);
            color: var(--text);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .menu {
            margin-bottom: 20px;
        }
        .menu a {
            margin-right: 15px;
            color: var(--primary);
            text-decoration: none;
        }
        .menu a:hover {
            text-decoration: underline;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .form-label {
            display: inline-block;
            width: 140px;
            font-weight: bold;
            color: var(--text);
        }
        input, select {
            width: 280px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--card-bg);
            color: var(--text);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .button {
            padding: 8px 15px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-right: 10px;
        }
        .button:hover {
            background: var(--secondary);
        }
        .cancel-link {
            color: var(--text-light);
            text-decoration: none;
        }
        .cancel-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        .form-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        @media (max-width: 600px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-label {
                width: auto;
                margin-bottom: 5px;
            }
            input, select {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
    <script>
    (function() {
        // 从 localStorage 读取已保存的主题
        const theme = localStorage.getItem('selectedTheme') || 'ocean';

        // 如果是自定义主题，直接覆盖 CSS 变量
        if (theme === 'custom') {
            const custom = localStorage.getItem('customTheme');
            if (custom) {
                try {
                    const t = JSON.parse(custom);
                    document.documentElement.style.setProperty('--primary', t.primary);
                    document.documentElement.style.setProperty('--secondary', t.secondary);
                    document.documentElement.style.setProperty('--background', t.background);
                    document.documentElement.style.setProperty('--card-bg', t.cardBg);
                    document.documentElement.style.setProperty('--text', t.text);
                    // 移除 data-theme 属性，避免覆盖自定义变量
                    document.documentElement.removeAttribute('data-theme');
                    return;
                } catch(e) {
                    console.error('Failed to load custom theme', e);
                }
            }
        }

        // 否则，设置 data-theme 属性以匹配保存的主题
        document.documentElement.setAttribute('data-theme', theme);
    })();
</script>
</head>
<body>

<div class="container">
    <!-- 导航菜单 -->
    <div class="menu">
        <a href="/home/" data-i18n="home">Home</a>
        <a href="/profile/" data-i18n="my_profile">My Profile</a>
        <a href="/settings/" data-i18n="settings">Settings</a>
        <a href="/02_Web版本/classes" data-i18n="classes">Classes</a>
        <a href="/02_Web版本/forum" data-i18n="forum">Forum</a>
        <a href="/02_Web版本/jobs" data-i18n="job_search">Job Search</a>
        {% if user_role == 'admin' %}
        <a href="/admin-panel/users/" data-i18n="admin">Admin</a>
        {% endif %}
        <a href="/logout/" data-i18n="logout">Logout</a>
        <span style="float:right;" data-i18n="welcome_prefix">Welcome, {{ user_name }}</span>
    </div>

    <h1>
        {% if is_edit %}
        <span data-i18n="edit_class">Edit Class</span>
        {% else %}
        <span data-i18n="add_class">Add Class</span>
        {% endif %}
    </h1>

    <!-- 显示后端返回的错误信息 -->
    {% if messages %}
        {% for msg in messages %}
            <div class="message error">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <!-- 班级表单 -->
    <form method="post">
        {% csrf_token %}

        <!-- 学院 -->
        <div class="form-group">
            <label for="faculty" class="form-label" data-i18n="faculty">Faculty (学院):</label>
            <input type="text" id="faculty" name="faculty"
                   value="{% if class_obj %}{{ class_obj.faculty }}{% endif %}" required>
        </div>

        <!-- 专业 -->
        <div class="form-group">
            <label for="major" class="form-label" data-i18n="major">Major (专业):</label>
            <input type="text" id="major" name="major"
                   value="{% if class_obj %}{{ class_obj.major }}{% endif %}" required>
        </div>

        <!-- 班级编号 -->
        <div class="form-group">
            <label for="class_number" class="form-label" data-i18n="class_number">Class Number (班级):</label>
            <input type="text" id="class_number" name="class_number"
                   value="{% if class_obj %}{{ class_obj.class_number }}{% endif %}" required>
        </div>

        <!-- 毕业年份 -->
        <div class="form-group">
            <label for="graduation_year" class="form-label" data-i18n="graduation_year">Graduation Year:</label>
            <input type="number" id="graduation_year" name="graduation_year" min="1950" max="2030"
                   value="{% if class_obj %}{{ class_obj.graduation_year }}{% endif %}" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="button">
                {% if is_edit %}
                <span data-i18n="update_class">Update Class</span>
                {% else %}
                <span data-i18n="create_class">Create Class</span>
                {% endif %}
            </button>
            <a href="/02_Web版本/classes" class="cancel-link" data-i18n="cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
