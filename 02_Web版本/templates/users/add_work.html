<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="add_work_experience">Add Work Experience - SolarOrca</title>
    <style>
        :root {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="ocean"] {
            --primary: #006994;
            --secondary: #48CAE4;
            --background: #F0F8FF;
            --card-bg: #FFFFFF;
            --text: #1A3A4A;
            --text-light: #5A7A8A;
            --border: #C5D5E6;
        }
        [data-theme="fall"] {
            --primary: #D35400;
            --secondary: #F39C12;
            --background: #FDF2E3;
            --card-bg: #FFF8F0;
            --text: #5D4037;
            --text-light: #8D6E63;
            --border: #E8D5B5;
        }
        [data-theme="midnight"] {
            --primary: #00B4D8;
            --secondary: #7B2EDA;
            --background: #0A1929;
            --card-bg: #1E2A3A;
            --text: #E0E0E0;
            --text-light: #A0AAB5;
            --border: #2A3A4A;
        }
        [data-theme="blossom"] {
            --primary: #E8A2B0;
            --secondary: #F5C6D0;
            --background: #FFF5F7;
            --card-bg: #FFFFFF;
            --text: #5E4B56;
            --text-light: #9A8B92;
            --border: #F0DDE3;
        }

        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: var(--background);
            color: var(--text);
        }
        .container { max-width: 600px; margin: 0 auto; }
        .menu {
            margin-bottom: 20px;
        }
        .menu a {
            margin-right: 15px;
            color: var(--primary);
            text-decoration: none;
        }
        .menu a:hover { text-decoration: underline; }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        label {
            display: inline-block;
            width: 130px;
            font-weight: bold;
            color: var(--text);
        }
        input, select {
            width: 280px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            padding: 8px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover { background: var(--secondary); }
        .cancel-link {
            margin-left: 15px;
            color: var(--text-light);
            text-decoration: none;
        }
        .cancel-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            background: #f8d7da;
            color: #721c24;
        }
        small {
            color: var(--text-light);
            font-size: 12px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input {
            width: auto;
        }
        .checkbox-group label {
            width: auto;
            font-weight: normal;
            cursor: pointer;
        }
        .form-actions {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .form-group {
                flex-direction: column;
                align-items: flex-start;
            }
            label {
                width: auto;
                margin-bottom: 5px;
            }
            input, select {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
    <script>
        // 表单验证：当前工作跳过结束年份验证，否则开始年份 ≤ 结束年份
        function validateForm() {
            const startYear = document.getElementById('startYear').value;
            const endYear = document.getElementById('endYear').value;
            const isCurrent = document.getElementById('isCurrent').checked;

            if (isCurrent) {
                return true;
            }

            if (endYear && parseInt(startYear) > parseInt(endYear)) {
                // TODO: replace with localized message using translation key
                alert('Start year must be less than or equal to end year.');
                return false;
            }
            return true;
        }

        // 勾选"当前工作"时禁用结束年份输入框
        function toggleEndYear() {
            const isCurrent = document.getElementById('isCurrent').checked;
            const endYearInput = document.getElementById('endYear');
            if (isCurrent) {
                endYearInput.disabled = true;
                endYearInput.value = '';
            } else {
                endYearInput.disabled = false;
            }
        }
    </script>
    <script>
    (function() {
        // 从 localStorage 读取已保存的主题
        const theme = localStorage.getItem('selectedTheme') || 'ocean';

        // 如果是自定义主题，直接覆盖 CSS 变量
        if (theme === 'custom') {
            const custom = localStorage.getItem('customTheme');
            if (custom) {
                try {
                    const t = JSON.parse(custom);
                    document.documentElement.style.setProperty('--primary', t.primary);
                    document.documentElement.style.setProperty('--secondary', t.secondary);
                    document.documentElement.style.setProperty('--background', t.background);
                    document.documentElement.style.setProperty('--card-bg', t.cardBg);
                    document.documentElement.style.setProperty('--text', t.text);
                    // 移除 data-theme 属性，避免覆盖自定义变量
                    document.documentElement.removeAttribute('data-theme');
                    return;
                } catch(e) {
                    console.error('Failed to load custom theme', e);
                }
            }
        }

        // 否则，设置 data-theme 属性以匹配保存的主题
        document.documentElement.setAttribute('data-theme', theme);
    })();
</script>
</head>
<body>

<div class="container">
    <!-- 导航菜单 -->
    <div class="menu">
        <a href="/home/" data-i18n="home">Home</a>
        <a href="/profile/" data-i18n="my_profile">My Profile</a>
        <a href="/settings/" data-i18n="settings">Settings</a>
        <a href="/02_Web版本/classes" data-i18n="classes">Classes</a>
        <a href="/02_Web版本/forum" data-i18n="forum">Forum</a>
        <a href="/02_Web版本/jobs" data-i18n="job_search">Job Search</a>
        <a href="/logout/" data-i18n="logout">Logout</a>
        <span style="float:right;"><span data-i18n="welcome_prefix">Welcome</span>, {{ user_name }}</span>
    </div>

    <h1 data-i18n="add_work_experience">Add Work Experience</h1>

    <!-- 显示后端返回的错误消息 -->
    {% if messages %}
        {% for msg in messages %}
            <div class="message">{{ msg }}</div>
        {% endfor %}
    {% endif %}

    <!-- 添加工作经历表单 -->
    <form method="post" onsubmit="return validateForm()">
        {% csrf_token %}

        <!-- 职位名称 -->
        <div class="form-group">
            <label for="job_title" data-i18n="job_title">Job Title:</label>
            <input type="text" id="job_title" name="job_title" required>
        </div>

        <!-- 雇主 -->
        <div class="form-group">
            <label for="employer" data-i18n="employer">Employer:</label>
            <input type="text" id="employer" name="employer" required>
        </div>

        <!-- 行业 -->
        <div class="form-group">
            <label for="industry" data-i18n="industry">Industry:</label>
            <select id="industry" name="industry">
                <option value="" data-i18n="select">-- Select --</option>
                <option value="Technology" data-i18n="technology">Technology</option>
                <option value="Finance" data-i18n="finance">Finance</option>
                <option value="Education" data-i18n="education">Education</option>
                <option value="Healthcare" data-i18n="healthcare">Healthcare</option>
                <option value="Manufacturing" data-i18n="manufacturing">Manufacturing</option>
                <option value="Other" data-i18n="other">Other</option>
            </select>
        </div>

        <!-- 开始年份 -->
        <div class="form-group">
            <label for="start_year" data-i18n="start_year">Start Year:</label>
            <input type="number" id="start_year" name="start_year" min="1950" max="2030" required>
        </div>

        <!-- 结束年份（留空表示至今） -->
        <div class="form-group">
            <label for="end_year" data-i18n="end_year">End Year:</label>
            <input type="number" id="end_year" name="end_year" min="1950" max="2030">
            <small data-i18n="leave_empty_current_job">(leave empty for current job)</small>
        </div>

        <!-- 当前工作 -->
        <div class="form-group checkbox-group">
            <input type="checkbox" id="isCurrent" name="is_current" onchange="toggleEndYear()">
            <label for="isCurrent" data-i18n="current_job">Current Job</label>
        </div>

        <div class="form-actions">
            <button type="submit" data-i18n="add_work">Add Work</button>
            <a href="/profile/" class="cancel-link" data-i18n="cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
